<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Judge — Botões e badges</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A227; --gold-bright: #E8C75A;
    --bg: #0D0A14; --surface-2: #1D1530; --border: #2C2240;
    --text: #EAE4D8; --muted: #A398B3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 28px; }
  .group { margin-bottom: 28px; }
  .label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 0.95rem; padding: 13px 26px;
    border-radius: 10px; text-decoration: none; border: none; cursor: pointer;
    transition: transform .15s, box-shadow .2s, border-color .2s, color .2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, #A07F1A 100%);
    color: #1A1408; box-shadow: 0 4px 18px rgba(201,162,39,0.25);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(201,162,39,0.4); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold-bright); }
  .badge {
    display: inline-block; font-size: 0.78rem; font-weight: 600;
    color: var(--gold-bright); border: 1px solid rgba(201,162,39,0.4);
    background: rgba(201,162,39,0.08); padding: 6px 16px; border-radius: 999px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .soon {
    display: inline-block; font-size: 0.7rem; font-weight: 700;
    background: rgba(14,104,171,0.18); color: #6FB6E8;
    border: 1px solid rgba(14,104,171,0.45);
    padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .copy-btn {
    background: var(--surface-2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 7px;
    font-size: 0.72rem; font-weight: 600; padding: 5px 10px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: color .2s, border-color .2s;
  }
  .copy-btn:hover { color: var(--gold-bright); border-color: var(--gold); }
  .pix-box {
    display: inline-flex; align-items: center; gap: 10px;
    background: #0A0810; border: 1px dashed var(--gold);
    border-radius: 10px; padding: 12px 14px;
    font-family: ui-monospace, monospace; font-size: 0.85rem; color: var(--gold-bright);
  }
  .pix-box button {
    background: var(--gold); border: none; color: #1A1408; font-weight: 700;
    font-size: 0.75rem; padding: 6px 12px; border-radius: 7px; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
</style>
</head>
<body>
  <div class="group">
    <div class="label">Botões</div>
    <div class="row">
      <a class="btn btn-primary" href="#">🔌 Adicionar ao Claude</a>
      <a class="btn btn-ghost" href="#">⬇️ Baixar pacote de skills</a>
      <button class="copy-btn">Copiar</button>
    </div>
  </div>
  <div class="group">
    <div class="label">Badges</div>
    <div class="row">
      <span class="badge">Assistente para o app do Claude · Gratuito</span>
      <span class="soon">Em breve</span>
    </div>
  </div>
  <div class="group">
    <div class="label">Caixa de PIX (com copiar)</div>
    <div class="pix-box"><span>chave-pix@exemplo.com</span><button>Copiar</button></div>
  </div>
</body>
</html>
